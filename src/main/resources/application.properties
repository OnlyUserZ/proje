spring.application.name=birgundegelecek

spring.redis.host=redis
spring.redis.port=6379
spring.flyway.enabled=false
spring.kafka.bootstrap-servers=kafka1:9092,kafka2:9092,kafka3:9092

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.enable-idempotence=true
spring.kafka.producer.retries=5
spring.kafka.producer.retry-backoff-ms=1000
spring.kafka.producer.max-in-flight-requests-per-connection=1
spring.kafka.producer.linger-ms=5
spring.kafka.producer.batch-size=32768
spring.kafka.producer.compression-type=snappy

spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.max-poll-records=50
spring.kafka.consumer.session-timeout-ms=30000
spring.kafka.consumer.heartbeat-interval-ms=10000
spring.kafka.consumer.isolation-level=READ_COMMITTED