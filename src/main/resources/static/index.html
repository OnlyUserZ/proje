<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirGundeGelecek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container">
        <h1>Giriş Yap / Kayıt Ol</h1>
        <div id="login-form">
            <h2>Login</h2>
            <input type="text" id="login-username" placeholder="Kullanıcı Adı">
            <input type="password" id="login-password" placeholder="Şifre">
            <button id="login-btn">Giriş Yap</button>
        </div>

        <div id="register-form">
            <h2>Register</h2>
            <input type="text" id="register-username" placeholder="Kullanıcı Adı">
            <input type="password" id="register-password" placeholder="Şifre">
            <button id="register-btn">Kayıt Ol</button>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <h1>Admin Panel</h1>
        <h2>Kategori Ekle</h2>
        <input type="text" id="kategori-ad" placeholder="Kategori Adı">
        <button id="kategori-ekle-btn">Ekle</button>

        <h2>Sorun Ekle</h2>
        <input type="text" id="sorun-baslik" placeholder="Başlık">
        <textarea id="sorun-icerik" placeholder="Sorun"></textarea>
        <textarea id="sorun-cozum" placeholder="Çözüm"></textarea>
        <input type="number" id="sorun-kategori-id" placeholder="Kategori ID">
        <button id="sorun-ekle-btn">Sorun Ekle</button>

        <button id="logout-btn">Çıkış Yap</button>
    </div>

    <div id="user-panel" class="hidden">
        <h1>Kullanıcı Paneli</h1>
        <h2>Kategoriler</h2>
        <ul id="kategori-list"></ul>

        <h2>Sorunlar</h2>
        <ul id="sorun-list"></ul>

        <button id="logout-btn-user">Çıkış Yap</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
